<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Joanne 管理">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%237c6a56%22 rx=%2220%22/><text x=%2250%22 y=%2268%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22white%22>⭐</text></svg>">
  
  <title>Joanne 的大腦外接碟</title>

  <script>
    const manifest = {
      "name": "Joanne 的大腦外接碟",
      "short_name": "ADHD 管理",
      "start_url": ".",
      "display": "standalone",
      "background_color": "#f7f4ef",
      "theme_color": "#7c6a56",
      "icons": [{
        "src": "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%237c6a56%22/><text x=%2250%22 y=%2268%22 font-size=%2260%22 text-anchor=%22middle%22 fill=%22white%22>⭐</text></svg>",
        "sizes": "192x192",
        "type": "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    document.write(`<link rel="manifest" href="${URL.createObjectURL(blob)}">`);
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin: 0; padding: 0; background-color: #f7f4ef; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    
    /* 閃爍動畫：用來提醒時間到，強制轉移注意力 */
    @keyframes flash {
      0% { background-color: #c0613a; }
      50% { background-color: #f7f4ef; }
      100% { background-color: #c0613a; }
    }
    .time-up-bg { animation: flash 1s infinite; color: white !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const P = {
      bg: "#f7f4ef", card: "#fffdf9", border: "#e2d9cc",
      text: "#3a2e24", sub: "#8c7b6b", accent: "#7c6a56",
      danger: "#c0613a", green: "#5a8a6a", tag: "#ede8e0", orange: "#a06030",
    };
    const PRIORITY = { high: { label: "緊急", color: "#c0613a", bg: "#fbe9e2", emoji: "🔴" }, medium: { label: "普通", color: "#a06030", bg: "#fef3e2", emoji: "🟡" }, low: { label: "之後", color: "#5a8a6a", bg: "#e8f2ec", emoji: "🟢" } };
    const SORT_ORDER = { high: 0, medium: 1, low: 2 };
    const PERIOD_LABEL = { daily: "每日", weekly: "每週", monthly: "每月", yearly: "每年" };
    const WEEKDAYS = ["週一", "週二", "週三", "週四", "週五", "週六", "週日"];
    const MONTHDAYS = Array.from({ length: 31 }, (_, i) => i + 1);
    const MONTHS = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
    const ICONS = ["⭐", "🏃", "📖", "🐶", "🌱", "🍱", "💧", "🛁", "🪴", "📝", "🎵", "🛒", "💪", "🧘", "📞", "🧴", "🗂️", "🪟", "💡", "🔧", "🧺", "🗑️", "🧹", "📦", "💳", "💊", "✂️", "🧦", "🎂", "📋", "🏥", "✈️", "🔑", "💰", "🪪", "💄", "💅", "✨"];

    const TIMER_TEMPLATES = [
      { id: "t_survival", icon: "🪫", label: "極簡生存洗沐", desc: "電力10%專用。不要管細節，有弄濕就算贏。", steps: [{ label: "脫衣服進浴室", duration: 1 }, { label: "重點部位清潔 (腋下/私密處/腳)", duration: 2 }, { label: "洗臉與刷牙", duration: 2 }] },
      { id: "t_standard", icon: "🚿", label: "標準洗沐", desc: "日常下班適用。限制洗頭與保養時間，防止完美主義發作。", steps: [{ label: "準備與脫衣", duration: 2 }, { label: "洗頭與沖洗", duration: 7 }, { label: "洗身體", duration: 5 }, { label: "洗臉 (勿過度搓揉)", duration: 2 }, { label: "擦乾、穿衣出浴室", duration: 4 }, { label: "吹頭髮", duration: 7 }, { label: "極簡鎖水保濕", duration: 3 }] },
      { id: "t_night", icon: "🌙", label: "夜間護膚與刷牙", desc: "整合電動牙刷與酸類保養吸收時間的精密排程。", steps: [{ label: "電動牙刷 (上下排定時)", duration: 2 }, { label: "溫和洗臉與按壓擦乾", duration: 3 }, { label: "第一道活性保養 (Tretinoin / AHA / 維他命C)", duration: 3 }, { label: "等待吸收緩衝時間 (滑一下手機)", duration: 7 }, { label: "最後鎖水乳液與收尾", duration: 5 }] }
    ];

    const INIT_ALARM_PRESETS = [
      { id: "p_1", label: "起床提醒", type: "fixed", time: "08:00" },
      { id: "p_2", label: "吃藥", type: "fixed", time: "09:00" },
      { id: "p_3", label: "喝水", type: "interval", interval: 2, start: "09:00", end: "21:00" },
      { id: "p_4", label: "睡前整理", type: "fixed", time: "22:30" }
    ];

    const INIT_ROUTINES = [
      { id: "laundry", icon: "🧺", label: "洗衣服", period: "weekly", weekdays: ["週六"], monthdays: [], month: null },
      { id: "trash", icon: "🗑️", label: "倒垃圾", period: "weekly", weekdays: ["週三"], monthdays: [], month: null },
      { id: "boxes", icon: "📦", label: "清空箱子", period: "weekly", weekdays: ["週日"], monthdays: [], month: null },
      { id: "socks", icon: "🧦", label: "洗襪子", period: "daily", weekdays: [], monthdays: [], month: null },
    ];

    const safeNotify = (title, body = "ADHD 管理提醒") => {
      try {
        if (typeof window === "undefined") return;
        if (!("Notification" in window)) return;
        if (window.Notification.permission === "granted") new window.Notification("⏰ " + title, { body });
      } catch (e) { }
    };
    const safeRequestNotifPerm = () => {
      try {
        if (typeof window !== "undefined" && "Notification" in window && window.Notification.permission === "default") window.Notification.requestPermission();
      } catch (e) { }
    };

    const defaultData = { anchor: "", deadlines: [], leaveTime: "", prepMinutes: 40, pendingItems: [], alarms: [], alarmPresets: INIT_ALARM_PRESETS, routines: INIT_ROUTINES, templates: TIMER_TEMPLATES };

    const loadData = () => {
      try {
        const raw = localStorage.getItem("adhd_joanne_v2");
        if (!raw) return defaultData;
        const p = JSON.parse(raw);
        if (!p.routines) p.routines = INIT_ROUTINES;
        if (!p.alarmPresets) p.alarmPresets = INIT_ALARM_PRESETS;
        if (!p.templates || p.templates.length === 0) p.templates = TIMER_TEMPLATES;
        return { ...defaultData, ...p };
      } catch (e) { return defaultData; }
    };
    const saveData = (d) => { try { localStorage.setItem("adhd_joanne_v2", JSON.stringify(d)); } catch (e) { } };

    const st = {
      app: { minHeight: "100vh", background: P.bg, fontFamily: "'Georgia', serif", color: P.text, paddingBottom: 60 },
      header: { padding: "calc(env(safe-area-inset-top, 0px) + 28px) 24px 16px", borderBottom: `1px solid ${P.border}`, background: P.card },
      sec: { margin: "20px 16px 0", background: P.card, borderRadius: 12, border: `1px solid ${P.border}`, overflow: "hidden" },
      sH: { padding: "14px 18px 10px", borderBottom: `1px solid ${P.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" },
      sT: { fontSize: 13, fontWeight: "bold", color: P.sub, letterSpacing: 1, textTransform: "uppercase" },
      sB: { padding: "14px 18px" },
      inp: { width: "100%", border: `1px solid ${P.border}`, borderRadius: 8, padding: "10px 12px", fontSize: 16, background: P.bg, color: P.text, outline: "none", boxSizing: "border-box", fontFamily: "inherit" },
      btn: { border: "none", borderRadius: 8, padding: "9px 18px", fontSize: 14, cursor: "pointer", fontFamily: "inherit", transition: "0.2s" },
      row: { display: "flex", gap: 8, alignItems: "center" },
    };

    /* ------ 共用組件 ------ */
    const DayBadge = ({ n }) => <span style={{ background: n <= 1 ? "#fbe9e2" : n <= 3 ? "#fef3e2" : P.tag, color: n <= 1 ? P.danger : n <= 3 ? P.orange : P.sub, borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: "bold", whiteSpace: "nowrap" }}>{n >= 0 ? `${n} 天` : "已過期"}</span>;

    const PriBadge = ({ value, onChange }) => {
      const [open, setOpen] = useState(false);
      const pv = PRIORITY[value] || PRIORITY.medium;
      const ref = useRef();
      useEffect(() => { const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
      return (
        <div ref={ref} style={{ position: "relative", display: "inline-block", flexShrink: 0 }}>
          <button onClick={() => setOpen(o => !o)} style={{ ...st.btn, background: pv.bg, color: pv.color, padding: "5px 10px", fontSize: 12, fontWeight: "bold", border: `1.5px solid ${pv.color}`, display: "flex", alignItems: "center", gap: 4, whiteSpace: "nowrap" }}>{pv.emoji} {pv.label} <span style={{ fontSize: 10, opacity: 0.7 }}>▴</span></button>
          {open && (
            <div style={{ position: "absolute", bottom: "110%", left: 0, zIndex: 100, background: P.card, border: `1px solid ${P.border}`, borderRadius: 8, boxShadow: "0 -4px 16px rgba(0,0,0,0.12)", overflow: "hidden", minWidth: 90 }}>
              {Object.entries(PRIORITY).map(([k, v]) => (
                <button key={k} onClick={() => { onChange(k); setOpen(false); }} style={{ ...st.btn, display: "block", width: "100%", textAlign: "left", padding: "9px 14px", fontSize: 13, background: k === value ? v.bg : P.card, color: k === value ? v.color : P.text, borderRadius: 0, fontWeight: k === value ? "bold" : "normal" }}>{v.emoji} {v.label}</button>
              ))}
            </div>
          )}
        </div>
      );
    };

    /* ------ 例行公事表單組件 ------ */
    const emptyDraft = (period = "weekly") => ({ label: "", icon: "⭐", period, weekdays: period === "weekly" ? ["週一"] : [], monthdays: period === "monthly" ? [1] : [], month: period === "yearly" ? "1月" : null });
    const buildPendingText = (r) => { if (r.period === "daily") return r.label; if (r.period === "weekly") { const d = (r.weekdays || []).join("、"); return d ? `${r.label}（${d}）` : r.label; } if (r.period === "monthly") { const md = (r.monthdays || []).join("、"); return md ? `${r.label}（每月 ${md} 號）` : r.label; } if (r.period === "yearly") return r.month ? `${r.label}（每年 ${r.month}）` : r.label; return r.label; };
    const scheduleHint = (r) => { if (r.period === "daily") return "每日"; if (r.period === "weekly") { const d = (r.weekdays || []).join("、"); return d ? `每週 ${d}` : "每週"; } if (r.period === "monthly") { const md = (r.monthdays || []).join("、"); return md ? `每月 ${md} 號` : "每月"; } if (r.period === "yearly") return r.month ? `每年 ${r.month}` : "每年"; return ""; };

    const RoutineFields = ({ draft, setDraft }) => {
      const toggleWD = (day) => { const cur = draft.weekdays || []; setDraft(d => ({ ...d, weekdays: cur.includes(day) ? cur.filter(d => d !== day) : [...cur, day] })); };
      const toggleMD = (day) => { const cur = draft.monthdays || []; setDraft(d => ({ ...d, monthdays: cur.includes(day) ? cur.filter(d => d !== day).sort((a,b)=>a-b) : [...cur, day].sort((a,b)=>a-b) })); };
      const changePeriod = (p) => setDraft(d => ({ ...d, period: p, weekdays: p === "weekly" ? (d.weekdays?.length ? d.weekdays : ["週一"]) : [], monthdays: p === "monthly" ? (d.monthdays?.length ? d.monthdays : [1]) : [], month: p === "yearly" ? (d.month || "1月") : null }));
      return (
        <div>
          <div style={{ marginBottom: 10 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 6 }}>圖示</div><div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>{ICONS.slice(0, 18).map(ic => <button key={ic} onClick={() => setDraft(d => ({ ...d, icon: ic }))} style={{ ...st.btn, padding: "5px 9px", fontSize: 15, background: draft.icon === ic ? P.accent : P.card, color: draft.icon === ic ? "#fff" : P.text, border: `1px solid ${draft.icon === ic ? P.accent : P.border}` }}>{ic}</button>)}</div></div>
          <div style={{ ...st.row, flexWrap: "wrap", gap: 8, marginBottom: 10 }}><input style={{ ...st.inp, flex: 2, minWidth: 120 }} placeholder="事項名稱" value={draft.label} onChange={e => setDraft(d => ({ ...d, label: e.target.value }))} /><select style={{ ...st.inp, flex: 1, minWidth: 90 }} value={draft.period} onChange={e => changePeriod(e.target.value)}><option value="daily">每日</option><option value="weekly">每週</option><option value="monthly">每月</option><option value="yearly">每年</option></select></div>
          {draft.period === "weekly" && <div style={{ marginBottom: 10 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 6 }}>哪幾天？</div><div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{WEEKDAYS.map(d => { const sel = (draft.weekdays || []).includes(d); return <button key={d} onClick={() => toggleWD(d)} style={{ ...st.btn, padding: "6px 12px", fontSize: 13, background: sel ? P.accent : P.card, color: sel ? "#fff" : P.text, border: `1px solid ${sel ? P.accent : P.border}`, fontWeight: sel ? "bold" : "normal" }}>{d}</button> })}</div></div>}
          {draft.period === "monthly" && <div style={{ marginBottom: 10 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 6 }}>每月幾號？</div><div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>{[1,5,10,15,20,25,30].map(n => { const sel = (draft.monthdays || []).includes(n); return <button key={n} onClick={() => toggleMD(n)} style={{ ...st.btn, padding: "5px 8px", fontSize: 13, background: sel ? P.accent : P.card, color: sel ? "#fff" : P.text, border: `1px solid ${sel ? P.accent : P.border}`, minWidth: 36, fontWeight: sel ? "bold" : "normal" }}>{n}</button> })}</div></div>}
        </div>
      );
    };

    /* ------ 專注計時器模組 ------ */
    const FocusTimerView = ({ template, onExit }) => {
      const [stepIndex, setStepIndex] = useState(0);
      const [timeLeft, setTimeLeft] = useState(template.steps[0].duration * 60);
      const [isRunning, setIsRunning] = useState(false);
      const [isTimeUp, setIsTimeUp] = useState(false);

      useEffect(() => { safeRequestNotifPerm(); }, []);

      useEffect(() => {
        let timer;
        if (isRunning && timeLeft > 0) {
          timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
        } else if (isRunning && timeLeft <= 0) {
          setIsTimeUp(true);
          safeNotify("時間到！", `請馬上結束「${template.steps[stepIndex].label}」，進入下一步驟。`);
          setIsRunning(false);
        }
        return () => clearInterval(timer);
      }, [isRunning, timeLeft, stepIndex, template]);

      const handleNext = () => {
        if (stepIndex < template.steps.length - 1) {
          setStepIndex(prev => prev + 1);
          setTimeLeft(template.steps[stepIndex + 1].duration * 60);
          setIsRunning(true);
          setIsTimeUp(false);
        } else {
          alert("全部完成！你成功戰勝了時間黑洞！");
          onExit();
        }
      };

      const formatTime = (secs) => `${Math.floor(secs / 60).toString().padStart(2, '0')}:${(secs % 60).toString().padStart(2, '0')}`;
      const currentStep = template.steps[stepIndex];
      const nextStep = template.steps[stepIndex + 1];

      return (
        <div className={isTimeUp ? "time-up-bg" : ""} style={{ position: "fixed", top: 0, left: 0, width: "100vw", height: "100vh", background: isTimeUp ? P.danger : P.card, zIndex: 9999, display: "flex", flexDirection: "column", padding: "40px 20px", boxSizing: "border-box" }}>
          <button onClick={onExit} style={{ position: "absolute", top: 20, right: 20, background: "transparent", border: "none", fontSize: 24, color: isTimeUp ? "#fff" : P.sub }}>✕</button>
          <div style={{ textAlign: "center", marginTop: "10vh", color: isTimeUp ? "#fff" : P.sub, fontSize: 16, fontWeight: "bold", letterSpacing: 2 }}>步驟 {stepIndex + 1} / {template.steps.length}</div>
          <div style={{ textAlign: "center", marginTop: 20, fontSize: 32, fontWeight: "bold", color: isTimeUp ? "#fff" : P.text, minHeight: 80 }}>{currentStep.label}</div>
          <div style={{ textAlign: "center", fontSize: "28vw", fontWeight: "bold", margin: "4vh 0", color: isTimeUp ? "#fff" : P.accent, fontFamily: "monospace", fontVariantNumeric: "tabular-nums" }}>{formatTime(timeLeft)}</div>
          <div style={{ textAlign: "center", color: isTimeUp ? "rgba(255,255,255,0.8)" : P.sub, fontSize: 16, height: 24 }}>{nextStep ? `下一步：${nextStep.label}` : "這是最後一步了！"}</div>
          <div style={{ marginTop: "auto", display: "flex", flexDirection: "column", gap: 16 }}>
            {isTimeUp ? (
              <button onClick={handleNext} style={{ ...st.btn, background: "#fff", color: P.danger, fontSize: 20, padding: 20, fontWeight: "bold", borderRadius: 16, boxShadow: "0 8px 24px rgba(0,0,0,0.2)" }}>我知道了，立刻換下一步！</button>
            ) : (
              <>
                <button onClick={() => setIsRunning(!isRunning)} style={{ ...st.btn, background: isRunning ? P.tag : P.accent, color: isRunning ? P.accent : "#fff", fontSize: 20, padding: 20, fontWeight: "bold", borderRadius: 16 }}>{isRunning ? "暫停" : (timeLeft === currentStep.duration * 60 ? "開始計時" : "繼續")}</button>
                <button onClick={handleNext} style={{ ...st.btn, background: "transparent", color: P.sub, border: `1px solid ${P.border}`, fontSize: 16, padding: 14 }}>提早完成，跳下一步</button>
              </>
            )}
          </div>
        </div>
      );
    };

    const TemplateEditor = ({ draft, onSave, onCancel }) => {
      const [local, setLocal] = useState(draft);
      const totalMinutes = local.steps.reduce((acc, step) => acc + (Number(step.duration) || 0), 0);
      const updateField = (field, val) => setLocal(p => ({ ...p, [field]: val }));
      const updateStep = (idx, field, val) => { const newSteps = [...local.steps]; newSteps[idx][field] = val; updateField("steps", newSteps); };
      const moveStep = (idx, dir) => { if (idx + dir < 0 || idx + dir >= local.steps.length) return; const newSteps = [...local.steps]; const temp = newSteps[idx]; newSteps[idx] = newSteps[idx + dir]; newSteps[idx + dir] = temp; updateField("steps", newSteps); };
      const addStep = () => updateField("steps", [...local.steps, { label: "", duration: 5 }]);
      const removeStep = (idx) => updateField("steps", local.steps.filter((_, i) => i !== idx));

      return (
        <div style={{ background: P.card, borderRadius: 12, padding: 16, border: `1px solid ${P.border}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}><div style={{ fontWeight: "bold", color: P.accent }}>編輯專注模板</div><div style={{ color: P.sub, fontSize: 13 }}>總計: {totalMinutes} 分鐘</div></div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}><input style={{ ...st.inp, width: 60, textAlign: "center" }} placeholder="圖示" value={local.icon} onChange={e => updateField("icon", e.target.value)} /><input style={{ ...st.inp, flex: 1 }} placeholder="模板名稱 (例如：下班後洗沐)" value={local.label} onChange={e => updateField("label", e.target.value)} /></div>
          <input style={{ ...st.inp, marginBottom: 16, fontSize: 13 }} placeholder="簡單描述一下這個模板的適用時機..." value={local.desc} onChange={e => updateField("desc", e.target.value)} />
          <div style={{ fontWeight: "bold", fontSize: 13, color: P.sub, marginBottom: 8 }}>步驟拆解</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {local.steps.map((step, idx) => (
              <div key={idx} style={{ display: "flex", gap: 6, alignItems: "center", background: P.tag, padding: "8px", borderRadius: 8 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 2 }}><button onClick={() => moveStep(idx, -1)} disabled={idx === 0} style={{ background: "transparent", border: "none", fontSize: 16, opacity: idx === 0 ? 0.3 : 1, padding: 0 }}>⬆️</button><button onClick={() => moveStep(idx, 1)} disabled={idx === local.steps.length - 1} style={{ background: "transparent", border: "none", fontSize: 16, opacity: idx === local.steps.length - 1 ? 0.3 : 1, padding: 0 }}>⬇️</button></div>
                <input style={{ ...st.inp, flex: 1, padding: "8px", fontSize: 14 }} placeholder="步驟名稱" value={step.label} onChange={e => updateStep(idx, "label", e.target.value)} />
                <input type="number" style={{ ...st.inp, width: 60, padding: "8px", textAlign: "center", fontSize: 14 }} min={1} value={step.duration} onChange={e => updateStep(idx, "duration", parseInt(e.target.value) || 0)} /><span style={{ fontSize: 12, color: P.sub }}>分</span>
                <button onClick={() => removeStep(idx)} style={{ background: "transparent", border: "none", color: P.danger, fontSize: 18, padding: "0 4px" }}>✕</button>
              </div>
            ))}
          </div>
          <button onClick={addStep} style={{ ...st.btn, width: "100%", background: "transparent", border: `1px dashed ${P.sub}`, color: P.sub, marginTop: 12, padding: 10 }}>＋ 新增步驟</button>
          <div style={{ display: "flex", gap: 8, marginTop: 24 }}><button onClick={() => onSave(local)} style={{ ...st.btn, flex: 2, background: P.accent, color: "#fff" }}>儲存模板</button><button onClick={onCancel} style={{ ...st.btn, flex: 1, background: P.tag, color: P.accent }}>取消</button></div>
        </div>
      );
    };

    /* ------ 主程式 ------ */
    const App = () => {
      const [data, setData] = useState(loadData);
      const [now, setNow] = useState(new Date());
      const [tab, setTab] = useState("today"); 
      const [newPending, setNewPending] = useState({ text: "", priority: "medium" });
      const [activeTemplate, setActiveTemplate] = useState(null); 
      const [editingTemplate, setEditingTemplate] = useState(null);
      
      const [showRoutineForm, setShowRoutineForm] = useState(false);
      const [newRoutine, setNewRoutine] = useState(emptyDraft("weekly"));
      const [editingRoutineId, setEditingRoutineId] = useState(null);
      const [editRoutineDraft, setEditRoutineDraft] = useState({});

      const [newAlarm, setNewAlarm] = useState({ label: "", type: "fixed", time: "", interval: 2, start: "09:00", end: "21:00" });
      const [editPresetsMode, setEditPresetsMode] = useState(false);
      const [newPreset, setNewPreset] = useState({ label: "", type: "fixed", time: "", interval: 2, start: "09:00", end: "21:00" });
      const [banner, setBanner] = useState(null);
      const [firedAlarms, setFiredAlarms] = useState({});

      const tickRef = useRef();

      useEffect(() => { tickRef.current = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(tickRef.current); }, []);
      useEffect(() => { saveData(data); }, [data]);

      // Alarm checker
      useEffect(() => {
        const cur = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
        const toFire = (data.alarms || []).filter(a => a.enabled && a.time === cur && !firedAlarms[`${a.id}_${cur}`]);
        if (toFire.length === 0) return;
        toFire.forEach(a => {
          setFiredAlarms(f => ({ ...f, [`${a.id}_${cur}`]: true }));
          safeNotify(a.label);
          setBanner(a.label);
          setTimeout(() => setBanner(null), 6000);
        });
      }, [now]);

      const upd = (p) => setData(d => ({ ...d, ...p }));

      // 總覽頁邏輯
      const prepStart = () => { if (!data.leaveTime) return null; const [h, m] = data.leaveTime.split(":").map(Number); const t = ((h * 60 + m - data.prepMinutes) % 1440 + 1440) % 1440; return `${String(Math.floor(t / 60)).padStart(2, "0")}:${String(t % 60).padStart(2, "0")}`; };
      const minsToLeave = () => { if (!data.leaveTime) return null; const [h, m] = data.leaveTime.split(":").map(Number); return h * 60 + m - (now.getHours() * 60 + now.getMinutes()); };
      const leavePercent = () => { const mtl = minsToLeave(); if (mtl === null || mtl < 0) return 0; if (mtl > 120) return 100; return (mtl / 120) * 100; };
      const urgent = (() => { const d = minsToLeave(); return d !== null && d <= data.prepMinutes && d > 0; })();

      const addPending = (text = null, priority = null) => {
        const t = (text || newPending.text).trim(); if (!t) return;
        upd({ pendingItems: [...data.pendingItems, { id: Date.now(), text: t, priority: priority || newPending.priority }] });
        if (!text) setNewPending({ text: "", priority: "medium" });
      };
      const removePending = (id) => upd({ pendingItems: data.pendingItems.filter(p => p.id !== id) });
      const updatePriority = (id, priority) => upd({ pendingItems: data.pendingItems.map(p => p.id === id ? { ...p, priority } : p) });
      const sortedPending = [...data.pendingItems].sort((a, b) => SORT_ORDER[a.priority] - SORT_ORDER[b.priority]);
      const pendingTexts = data.pendingItems.map(p => p.text);

      // 提醒功能邏輯
      const addAlarm = () => {
        if (!newAlarm.label.trim()) return;
        safeRequestNotifPerm();
        let newAlarms = [...(data.alarms || [])];
        if (newAlarm.type === 'fixed') {
          if (!newAlarm.time) return;
          if (!newAlarms.some(a => a.label === newAlarm.label && a.time === newAlarm.time)) newAlarms.push({ id: Date.now() + Math.random(), label: newAlarm.label, time: newAlarm.time, enabled: true });
        } else {
          if (!newAlarm.interval || !newAlarm.start || !newAlarm.end) return;
          let [sh, sm] = newAlarm.start.split(':').map(Number); let [eh, em] = newAlarm.end.split(':').map(Number);
          let curMin = sh * 60 + sm; let endMin = eh * 60 + em; let intMin = Math.max(0.5, Number(newAlarm.interval)) * 60;
          while (curMin <= endMin) {
            let timeStr = `${String(Math.floor(curMin / 60)).padStart(2, '0')}:${String(curMin % 60).padStart(2, '0')}`;
            if (!newAlarms.some(a => a.label === newAlarm.label && a.time === timeStr)) newAlarms.push({ id: Date.now() + Math.random(), label: newAlarm.label, time: timeStr, enabled: true });
            curMin += intMin;
          }
        }
        upd({ alarms: newAlarms }); setNewAlarm({ label: "", type: "fixed", time: "", interval: 2, start: "09:00", end: "21:00" });
      };

      const dateStr = now.toLocaleDateString("zh-TW", { month: "long", day: "numeric", weekday: "long" });
      const timeStr = now.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });

      return (
        <div style={st.app}>
          {banner && <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 999, background: P.accent, color: "#fff", padding: "calc(env(safe-area-inset-top, 0px) + 14px) 20px 14px", fontSize: 16, textAlign: "center", fontWeight: "bold", boxShadow: "0 2px 12px rgba(0,0,0,.15)" }}>⏰ {banner}</div>}
          
          {activeTemplate && <FocusTimerView template={activeTemplate} onExit={() => setActiveTemplate(null)} />}

          <div style={st.header}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ fontSize: 22, fontWeight: "bold", letterSpacing: 1, color: P.accent }}>Joanne 的大腦外接碟</div>
                <div style={{ fontSize: 13, color: P.sub, marginTop: 4 }}>{dateStr}</div>
              </div>
              <div style={{ fontSize: 28, fontWeight: "bold", color: P.accent, fontFamily: "monospace" }}>{timeStr}</div>
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 16, overflowX: "auto", paddingBottom: 4 }}>
              {[["today", "📋 總覽"], ["focus", "⏳ 專注"], ["routines", "🔁 例行"], ["alarms", "⏰ 提醒"]].map(([k, l]) => (
                <button key={k} onClick={() => setTab(k)} style={{ ...st.btn, background: tab === k ? P.accent : P.tag, color: tab === k ? "#fff" : P.accent, padding: "7px 14px", fontSize: 13, whiteSpace: "nowrap" }}>{l}</button>
              ))}
            </div>
          </div>

          {tab === "today" && <>
            <div style={{ ...st.sec, border: urgent ? `2px solid ${P.danger}` : `1px solid ${P.border}` }}>
              <div style={st.sH}><span style={st.sT}>🚪 出門倒數</span>{minsToLeave() !== null && minsToLeave() > 0 && <span style={{ fontSize: 13, color: urgent ? P.danger : P.green, fontWeight: "bold" }}>剩 {minsToLeave()} 分鐘</span>}</div>
              {minsToLeave() !== null && minsToLeave() > 0 && <div style={{ height: 6, background: P.tag, width: "100%" }}><div style={{ height: "100%", width: `${leavePercent()}%`, background: urgent ? P.danger : P.green, transition: "width 1s linear" }} /></div>}
              <div style={st.sB}>
                <div style={{ display: "flex", gap: 12 }}>
                   <div style={{ flex: 1 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 4 }}>預計出門時間</div><input type="time" style={st.inp} value={data.leaveTime} onChange={e => upd({ leaveTime: e.target.value })} /></div>
                   <div style={{ flex: 1 }}><div style={{ fontSize: 12, color: P.sub, marginBottom: 4 }}>準備需要 (分)</div><input type="number" style={st.inp} value={data.prepMinutes} onChange={e => upd({ prepMinutes: parseInt(e.target.value) || 0 })} /></div>
                </div>
                {prepStart() && <div style={{ background: urgent ? "#fbe9e2" : P.tag, borderRadius: 8, padding: "10px 14px", fontSize: 14, marginTop: 16 }}><span style={{ color: P.sub }}>鬧鐘設定：最晚 </span><strong style={{ color: urgent ? P.danger : P.accent, fontSize: 18 }}>{prepStart()}</strong><span style={{ color: P.sub }}> 必須開始動作。</span></div>}
              </div>
            </div>

            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>📦 雜物暫放區 (隨手丟)</span></div>
              <div style={st.sB}>
                <div style={{ ...st.row, marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
                  <input style={{ ...st.inp, flex: 2, minWidth: 140 }} placeholder="剛收到的包裹、未洗的襪子..." value={newPending.text} onChange={e => setNewPending(p => ({ ...p, text: e.target.value }))} onKeyDown={e => e.key === "Enter" && addPending()} />
                  <div style={{ display: "flex", gap: 4 }}>{Object.entries(PRIORITY).map(([k, v]) => <button key={k} onClick={() => setNewPending(p => ({ ...p, priority: k }))} style={{ ...st.btn, padding: "9px 11px", fontSize: 14, background: newPending.priority === k ? v.bg : P.tag, color: newPending.priority === k ? v.color : P.sub, border: `1.5px solid ${newPending.priority === k ? v.color : "transparent"}` }}>{v.emoji}</button>)}</div>
                  <button style={{ ...st.btn, background: P.accent, color: "#fff" }} onClick={() => addPending()}>丟入</button>
                </div>
                {sortedPending.length === 0 && <div style={{ color: P.sub, fontSize: 14, textAlign: "center", padding: "8px 0" }}>暫放區是空的 ✓</div>}
                {sortedPending.map((item, i) => (
                  <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 0", borderTop: i > 0 ? `1px solid ${P.border}` : "none" }}>
                    <PriBadge value={item.priority} onChange={v => updatePriority(item.id, v)} />
                    <span style={{ flex: 1, fontSize: 14 }}>{item.text}</span>
                    <button style={{ ...st.btn, background: P.tag, color: P.accent, padding: "5px 12px", fontSize: 12, whiteSpace: "nowrap" }} onClick={() => removePending(item.id)}>處理完畢 ✓</button>
                  </div>
                ))}
              </div>
            </div>
          </>}

          {tab === "focus" && (
            <div style={st.sec}>
              <div style={st.sH}>
                <span style={st.sT}>⏳ 步驟拆解定時器</span>
                {!editingTemplate && <button onClick={() => setEditingTemplate({ id: Date.now(), icon: "✨", label: "", desc: "", steps: [{ label: "第一步", duration: 5 }] })} style={{ ...st.btn, background: "transparent", color: P.accent, padding: 0, fontSize: 13, fontWeight: "bold" }}>＋ 新增模板</button>}
              </div>
              <div style={st.sB}>
                {editingTemplate ? (
                  <TemplateEditor draft={editingTemplate} 
                    onSave={(savedTmpl) => {
                      const newTemplates = (data.templates || TIMER_TEMPLATES).some(t => t.id === savedTmpl.id) ? (data.templates || TIMER_TEMPLATES).map(t => t.id === savedTmpl.id ? savedTmpl : t) : [...(data.templates || TIMER_TEMPLATES), savedTmpl];
                      upd({ templates: newTemplates }); setEditingTemplate(null);
                    }} 
                    onCancel={() => setEditingTemplate(null)} 
                  />
                ) : (
                  <>
                    <div style={{ fontSize: 14, color: P.sub, marginBottom: 16, lineHeight: 1.5 }}>對抗完美主義！時間到系統會強制你換下一步。</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {(data.templates || TIMER_TEMPLATES).map(tmpl => (
                        <div key={tmpl.id} style={{ display: "flex", gap: 8 }}>
                          <button onClick={() => setActiveTemplate(tmpl)} style={{ ...st.btn, flex: 1, background: P.card, border: `1.5px solid ${P.accent}`, padding: 16, textAlign: "left", display: "flex", alignItems: "center", gap: 16, borderRadius: 12 }}>
                            <div style={{ fontSize: 32 }}>{tmpl.icon}</div>
                            <div><div style={{ fontSize: 16, fontWeight: "bold", color: P.accent }}>{tmpl.label}</div><div style={{ fontSize: 12, color: P.sub, marginTop: 4 }}>{tmpl.desc}</div></div>
                          </button>
                          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                            <button onClick={() => setEditingTemplate(tmpl)} style={{ ...st.btn, flex: 1, background: P.tag, color: P.accent, padding: "0 12px" }}>✏️</button>
                            <button onClick={() => { if(window.confirm("確定刪除？")) upd({ templates: (data.templates || TIMER_TEMPLATES).filter(t => t.id !== tmpl.id) }); }} style={{ ...st.btn, flex: 1, background: "#fbe9e2", color: P.danger, padding: "0 12px" }}>🗑️</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          {tab === "routines" && (
            <div style={st.sec}>
              <div style={st.sH}>
                <span style={st.sT}>🔁 例行公事</span>
                <button onClick={() => { setShowRoutineForm(v => !v); setEditingRoutineId(null); }} style={{ ...st.btn, background: showRoutineForm ? P.tag : P.accent, color: showRoutineForm ? P.accent : "#fff", padding: "6px 14px", fontSize: 13 }}>{showRoutineForm ? "取消" : "＋ 自訂"}</button>
              </div>
              <div style={st.sB}>
                {showRoutineForm && (
                  <div style={{ background: P.tag, borderRadius: 10, padding: 14, marginBottom: 18 }}>
                    <div style={{ fontSize: 13, color: P.sub, fontWeight: "bold", marginBottom: 10 }}>新增例行事項</div>
                    <RoutineFields draft={newRoutine} setDraft={setNewRoutine} />
                    <button style={{ ...st.btn, background: newRoutine.label.trim() ? P.accent : "#c8bfb5", color: "#fff", width: "100%", marginTop: 4 }} onClick={() => { if(newRoutine.label.trim()) { upd({ routines: [...data.routines, { id: `c_${Date.now()}`, ...newRoutine }] }); setNewRoutine(emptyDraft("weekly")); setShowRoutineForm(false); } }}>確認新增</button>
                  </div>
                )}
                {["daily", "weekly", "monthly", "yearly"].map(period => {
                  const items = data.routines.filter(r => r.period === period);
                  if (items.length === 0) return null;
                  return (
                    <div key={period} style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 12, color: P.sub, fontWeight: "bold", marginBottom: 10, letterSpacing: 1 }}>{PERIOD_LABEL[period]}</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {items.map(r => {
                          const pt = buildPendingText(r);
                          const already = pendingTexts.includes(pt);
                          if (editingRoutineId === r.id) return (
                            <div key={r.id} style={{ background: P.tag, borderRadius: 10, padding: 12 }}>
                              <RoutineFields draft={editRoutineDraft} setDraft={setEditRoutineDraft} />
                              <div style={{ ...st.row, gap: 8, marginTop: 8 }}><button style={{ ...st.btn, background: editRoutineDraft.label.trim() ? P.accent : "#c8bfb5", color: "#fff", flex: 1 }} onClick={() => { if(editRoutineDraft.label.trim()){ upd({ routines: data.routines.map(old => old.id === r.id ? { ...old, ...editRoutineDraft } : old) }); setEditingRoutineId(null); } }}>儲存</button><button style={{ ...st.btn, background: P.card, color: P.accent, flex: 1 }} onClick={() => setEditingRoutineId(null)}>取消</button></div>
                            </div>
                          );
                          return (
                            <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <button onClick={() => !already && addPending(pt, "medium")} style={{ ...st.btn, background: already ? P.green : P.card, color: already ? "#fff" : P.accent, fontSize: 14, padding: "10px 16px", display: "flex", alignItems: "center", gap: 8, border: `1px solid ${already ? P.green : P.border}`, flex: 1, justifyContent: "flex-start" }}>
                                <span style={{ fontSize: 18 }}>{r.icon}</span><div style={{ textAlign: "left" }}><div>{r.label}</div><div style={{ fontSize: 11, color: already ? "rgba(255,255,255,0.75)" : P.sub, marginTop: 1 }}>{scheduleHint(r)}</div></div>{already && <span style={{ fontSize: 12, marginLeft: "auto" }}>✓</span>}
                              </button>
                              <button onClick={() => { setEditingRoutineId(r.id); setEditRoutineDraft(r); }} style={{ ...st.btn, background: P.tag, color: P.accent, padding: "8px 11px", fontSize: 13 }}>✏️</button>
                              <button onClick={() => upd({ routines: data.routines.filter(x => x.id !== r.id) })} style={{ ...st.btn, background: "#fbe9e2", color: P.danger, padding: "8px 11px", fontSize: 13 }}>✕</button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {tab === "alarms" && (
            <div style={st.sec}>
              <div style={st.sH}><span style={st.sT}>⏰ 提醒設定</span><span style={{ fontSize: 12, color: P.sub }}>{(data.alarms || []).filter(a => a.enabled).length} 個啟用中</span></div>
              <div style={st.sB}>
                <div style={{ background: P.tag, borderRadius: 8, padding: "10px 14px", fontSize: 13, color: P.sub, marginBottom: 16 }}>💡 確保手機瀏覽器允許推播通知。</div>
                <div style={{ marginBottom: 20 }}>
                  <div style={{ ...st.row, marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
                    <input style={{ ...st.inp, flex: 2, minWidth: 120 }} placeholder="自訂提醒名稱" value={newAlarm.label} onChange={e => setNewAlarm(a => ({ ...a, label: e.target.value }))} />
                    <select style={{ ...st.inp, flex: 1, minWidth: 100 }} value={newAlarm.type} onChange={e => setNewAlarm(a => ({ ...a, type: e.target.value }))}><option value="fixed">單次</option><option value="interval">間隔重複</option></select>
                  </div>
                  {newAlarm.type === 'fixed' ? (
                    <div style={{ ...st.row, flexWrap: "wrap", gap: 8 }}><input type="time" style={{ ...st.inp, flex: 1, minWidth: 100 }} value={newAlarm.time} onChange={e => setNewAlarm(a => ({ ...a, time: e.target.value }))} /><button style={{ ...st.btn, background: P.accent, color: "#fff", whiteSpace: "nowrap" }} onClick={addAlarm}>+ 新增</button></div>
                  ) : (
                    <div style={{ background: P.card, border: `1px solid ${P.border}`, borderRadius: 8, padding: 12 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 8 }}><span style={{ fontSize: 13 }}>每</span><input type="number" style={{ ...st.inp, padding: "6px", width: 60, textAlign: "center" }} min={1} value={newAlarm.interval} onChange={e => setNewAlarm({ ...newAlarm, interval: e.target.value })} /><span style={{ fontSize: 13 }}>小時提醒。時段從：</span></div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}><input type="time" style={{ ...st.inp, padding: "8px", flex: 1 }} value={newAlarm.start} onChange={e => setNewAlarm({ ...newAlarm, start: e.target.value })} /><span style={{ fontSize: 12, color: P.sub }}>到</span><input type="time" style={{ ...st.inp, padding: "8px", flex: 1 }} value={newAlarm.end} onChange={e => setNewAlarm({ ...newAlarm, end: e.target.value })} /></div>
                      <button style={{ ...st.btn, background: P.accent, color: "#fff", width: "100%", padding: "8px" }} onClick={addAlarm}>+ 批次新增</button>
                    </div>
                  )}
                </div>
                
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, borderTop: `1px solid ${P.border}`, paddingTop: 16 }}>
                    <div style={{ fontSize: 12, color: P.sub }}>今日排定提醒列：</div>
                    {(data.alarms || []).length > 0 && <button onClick={() => upd({ alarms: [] })} style={{ ...st.btn, background: "#fbe9e2", color: P.danger, padding: "4px 10px", fontSize: 12 }}>🗑️ 刪除全部</button>}
                </div>
                {[...(data.alarms || [])].sort((a, b) => a.time.localeCompare(b.time)).map((a, i) => (
                  <div key={a.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 0", borderTop: i > 0 ? `1px solid ${P.border}` : "none" }}>
                    <div style={{ ...st.row, gap: 12 }}><div style={{ fontFamily: "monospace", fontSize: 18, color: a.enabled ? P.accent : P.sub, fontWeight: "bold" }}>{a.time}</div><div style={{ fontSize: 14, color: a.enabled ? P.text : P.sub }}>{a.label}</div></div>
                    <div style={{ ...st.row, gap: 8 }}>
                      <button onClick={() => upd({ alarms: (data.alarms || []).map(al => al.id === a.id ? { ...al, enabled: !al.enabled } : al) })} style={{ ...st.btn, background: a.enabled ? P.green : P.tag, color: a.enabled ? "#fff" : P.sub, padding: "5px 12px", fontSize: 12 }}>{a.enabled ? "開啟" : "關閉"}</button>
                      <button style={{ ...st.btn, background: "#fbe9e2", color: P.danger, padding: "5px 10px", fontSize: 12 }} onClick={() => upd({ alarms: (data.alarms || []).filter(al => al.id !== a.id) })}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ textAlign: "center", marginTop: 32, fontSize: 12, color: P.sub }}>一次只需要做好一件事，Joanne ✦</div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
